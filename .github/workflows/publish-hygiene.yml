name: Publish Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main --depth=1

      - name: Check publish hygiene
        run: npm run check:publish -- --base origin/main
