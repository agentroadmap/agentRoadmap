ruleset: credentials
description: Hardcoded credentials that leak secrets into codebase
rules:
  - id: credentials.aws-key
    description: AWS access key ID (AKIA prefix)
    severity: critical
    confidence: high
    proposal: P449
    tags:
      - credentials
      - aws
      - secrets
    regex: "AKIA[0-9A-Z]{16}"
    fix_suggestion: |
      Use IAM roles or temporary credentials instead.
    examples_match:
      - 'const key = "AKIAIOSFODNN7EXAMPLE";'
    examples_no_match:
      - 'const s3 = new AWS.S3();'

  - id: credentials.aws-secret
    description: AWS secret access key
    severity: critical
    confidence: medium
    proposal: P449
    tags:
      - credentials
      - aws
      - secrets
    regex: "aws_secret_access_key\\s*[:=]"
    fix_suggestion: |
      AWS secrets must use credential providers.
    examples_match:
      - 'aws_secret_access_key = "wJalrXUtnFEMI...";'
    examples_no_match:
      - 'const creds = await assumeRole(...);'

  - id: credentials.anthropic-api-key
    description: Anthropic API key (sk-ant-* prefix)
    severity: critical
    confidence: high
    proposal: P449
    tags:
      - credentials
      - anthropic
      - secrets
    regex: "sk-ant-[a-zA-Z0-9_-]{10,}"
    fix_suggestion: |
      Store API keys in environment variables or vault.
    examples_match:
      - 'const key = "sk-ant-some_key_here";'
    examples_no_match:
      - 'const key = process.env.ANTHROPIC_API_KEY;'

  - id: credentials.openai-api-key
    description: OpenAI API key (sk-* prefix)
    severity: critical
    confidence: medium
    proposal: P449
    tags:
      - credentials
      - openai
      - secrets
    regex: "sk-[a-zA-Z0-9_-]{15,}"
    file_glob_exclude:
      - '**/*.test.ts'
      - 'tests/**'
    fix_suggestion: |
      Use environment variables for OpenAI keys.
    examples_match:
      - 'const key = "sk-abcdef1234567890";'
    examples_no_match:
      - 'const key = process.env.OPENAI_API_KEY;'

  - id: credentials.github-pat
    description: GitHub Personal Access Token
    severity: critical
    confidence: high
    proposal: P449
    tags:
      - credentials
      - github
      - secrets
    regex: "(ghp_|github_pat_)[a-zA-Z0-9_]{20,}"
    fix_suggestion: |
      GitHub tokens must be stored securely.
    examples_match:
      - 'const pat = "ghp_abcdef1234567890abcd";'
    examples_no_match:
      - 'const token = process.env.GITHUB_TOKEN;'

  - id: credentials.gcp-service-account
    description: GCP service account JSON or private key
    severity: critical
    confidence: high
    proposal: P449
    tags:
      - credentials
      - gcp
      - secrets
    pattern: 'BEGIN PRIVATE KEY'
    fix_suggestion: |
      GCP credentials must use proper secret management.
    examples_match:
      - 'const key = "-----BEGIN PRIVATE KEY-----";'
    examples_no_match:
      - 'const storage = new Storage();'

  - id: credentials.private-key-block
    description: PEM-format private key blocks
    severity: critical
    confidence: high
    proposal: P449
    tags:
      - credentials
      - ssh
      - tls
      - secrets
    pattern: 'BEGIN PRIVATE KEY'
    fix_suggestion: |
      Private keys must never be in code.
    examples_match:
      - 'const key = "-----BEGIN PRIVATE KEY-----";'
    examples_no_match:
      - 'const key = fs.readFileSync(keyPath);'

  - id: credentials.bearer-token
    description: Bearer token in code
    severity: critical
    confidence: medium
    proposal: P449
    tags:
      - credentials
      - secrets
      - auth
    regex: "Bearer\\s+[a-zA-Z0-9_]{20,}"
    file_glob_exclude:
      - '**/*.test.ts'
      - 'tests/**'
      - 'docs/**'
      - 'src/core/security/**'
    fix_suggestion: |
      Bearer tokens must come from environment.
    examples_match:
      - 'Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9'
    examples_no_match:
      - 'Authorization: `Bearer ${process.env.TOKEN}`'

  - id: credentials.dotenv-leak
    description: Committed .env files containing secrets
    severity: critical
    confidence: high
    proposal: P449
    tags:
      - credentials
      - secrets
      - dotenv
    regex: "(?:^|\\s)\\.env(?:\\s|$)"
    file_glob:
      - '.env'
      - '.env.local'
    fix_suggestion: |
      .env files must never be committed. Add to .gitignore.
    examples_match:
      - 'file: .env'
    examples_no_match:
      - 'file: .env.example'
