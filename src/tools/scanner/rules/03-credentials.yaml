ruleset: credentials
description: Secret-shaped strings and credential literals that must never appear in source
rules:
  - id: credentials.aws-access-key
    description: AWS Access Key ID (AKIA prefix) in source code
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, aws, secret, sensitive]
    regex: 'AKIA[0-9A-Z]{16}'
    fix_suggestion: |
      AWS credentials must never be committed. Store in a secrets manager:

      ```typescript
      // DO NOT hardcode:
      // const accessKey = "AKIAIOSFODNN7EXAMPLE";

      // Instead: use AWS SDK credential chain or environment variables
      import { fromEnv } from '@aws-sdk/credential-providers';
      const credentials = fromEnv(); // reads AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY

      // Or: use Vault or AWS Secrets Manager
      const secret = await vault.getSecret('aws/access-key');
      ```

      If this is a real credential, revoke it immediately on AWS console.
    examples_match:
      - 'const keyId = "AKIAIOSFODNN7EXAMPLE";'
      - 'keyId: "AKIA5QTBN63EXMPL",'
    examples_no_match:
      - 'const credentials = await fromEnv(); // AWS SDK handles credential lookup'
      - '// Example: AKIAIOSFODNN7EXAMPLE (revoked)'

  - id: credentials.aws-secret
    description: AWS Secret Access Key (40-char base64-ish) following aws_secret_access_key keyword
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, aws, secret, sensitive]
    regex: 'aws_secret_access_key\s*[:=]\s*["\']?[a-zA-Z0-9/+=]{40}["\']?'
    fix_suggestion: |
      AWS Secret Keys must never appear in source. Use credential providers:

      ```typescript
      // DO NOT:
      // const secretKey = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY";

      // Instead:
      import { fromEnv } from '@aws-sdk/credential-providers';
      const credentials = fromEnv();

      // Or for testing: use localstack or moto mock services
      const s3 = new S3Client({
        region: 'us-east-1',
        credentials: await fromEnv(),
      });
      ```

      If exposed, revoke the key immediately.
    examples_match:
      - 'aws_secret_access_key = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"'
    examples_no_match:
      - 'const credentials = await fromEnv();'

  - id: credentials.anthropic-api-key
    description: Anthropic API key (sk-ant- prefix) in source code
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, anthropic, secret, sensitive]
    regex: 'sk-ant-[a-zA-Z0-9_\-]{20,}'
    fix_suggestion: |
      Anthropic API keys must use environment variables or credential providers:

      ```typescript
      // DO NOT hardcode:
      // const apiKey = "sk-ant-abc123...";

      // Instead:
      const apiKey = process.env.ANTHROPIC_API_KEY;
      if (!apiKey) {
        throw new Error('ANTHROPIC_API_KEY environment variable is required');
      }

      const client = new Anthropic({ apiKey });
      ```

      Environment variable: `ANTHROPIC_API_KEY`

      If exposed, regenerate the key in the Anthropic console immediately.
    examples_match:
      - 'const apiKey = "sk-ant-abc123def456ghi789";'
      - 'apiKey: "sk-ant-" + token,'
    examples_no_match:
      - 'const apiKey = process.env.ANTHROPIC_API_KEY;'
      - '// Example: sk-ant-... (redacted for security)'

  - id: credentials.openai-api-key
    description: OpenAI API key (sk- prefix, 20+ chars) in source code
    severity: critical
    confidence: medium
    proposal: P448
    tags: [credentials, openai, secret, sensitive]
    regex: 'sk-[a-zA-Z0-9]{20,}(?![a-zA-Z0-9])'
    fix_suggestion: |
      OpenAI API keys must use environment variables. This rule has medium confidence
      because "sk-" is used in other contexts; require contextual keywords (api, key, token)
      within 30 characters:

      ```typescript
      // DO NOT hardcode:
      // const openaiKey = "sk-abc123def456...";

      // Instead:
      const apiKey = process.env.OPENAI_API_KEY;
      const client = new OpenAI({ apiKey });
      ```

      Environment variable: `OPENAI_API_KEY`

      If exposed, revoke in OpenAI platform settings immediately.
    examples_match:
      - 'const apiKey = "sk-proj-abc123def456ghi789klmn";'
      - 'openai_api_key = "sk-abcdefghij1234567890"'
    examples_no_match:
      - 'const apiKey = process.env.OPENAI_API_KEY;'
      - 'const socketId = "sk-12345"; // unrelated'

  - id: credentials.github-pat
    description: GitHub Personal Access Token (ghp_ or github_pat_ prefix)
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, github, secret, sensitive]
    regex: '(ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{80,})'
    fix_suggestion: |
      GitHub PATs must never be committed. Use environment variables or GitHub Apps:

      ```typescript
      // DO NOT:
      // const token = "ghp_abc123def456...";

      // Instead: environment variable
      const token = process.env.GITHUB_TOKEN;
      if (!token) throw new Error('GITHUB_TOKEN is required');

      const octokit = new Octokit({ auth: token });

      // Or: use GitHub App instead (recommended for CI/CD)
      const app = new App({ appId: process.env.GITHUB_APP_ID, privateKey: ... });
      ```

      Environment variables: `GITHUB_TOKEN`, `GITHUB_APP_ID`, `GITHUB_APP_PRIVATE_KEY`

      If exposed, revoke the token in GitHub settings immediately.
    examples_match:
      - 'const token = "ghp_abc123def456ghi789jkl012mnopqr";'
      - 'githubToken: "github_pat_11ABCDEFGHIJKLMNOPQRSTUVWXYZ12345678901234567890123456789012",'
    examples_no_match:
      - 'const token = process.env.GITHUB_TOKEN;'

  - id: credentials.gcp-service-account
    description: GCP Service Account JSON with "type": "service_account" header
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, gcp, secret, sensitive, json]
    regex: '["\']type["\']\s*:\s*["\']service_account["\']'
    fix_suggestion: |
      GCP service account keys must not be embedded in source. Use Google Cloud auth:

      ```typescript
      // DO NOT embed service account JSON:
      // const sa = { "type": "service_account", "project_id": "...", ... };

      // Instead: use Application Default Credentials
      import { Storage } from '@google-cloud/storage';
      const storage = new Storage({
        // Reads from GOOGLE_APPLICATION_CREDENTIALS env var or default locations
        projectId: process.env.GCP_PROJECT_ID,
      });

      // Or: load from a secure vault
      const saKey = await vault.getSecret('gcp/service-account');
      const storage = new Storage({ projectId: saKey.project_id, ... });
      ```

      Environment variable: `GOOGLE_APPLICATION_CREDENTIALS` (path to key file)
      Or use workload identity / OIDC federation instead.

      If exposed, disable the key in GCP console immediately.
    examples_match:
      - '"type": "service_account"'
      - '{ "type": "service_account", "project_id": "my-gcp-project" }'
    examples_no_match:
      - 'const creds = await auth.getApplicationDefault();'
      - 'const keyFile = process.env.GOOGLE_APPLICATION_CREDENTIALS;'

  - id: credentials.private-key-block
    description: RSA, EC, or SSH private key block (-----BEGIN PRIVATE KEY-----)
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, private-key, secret, sensitive, pem]
    regex: '-----BEGIN\s+(RSA\s+|EC\s+|OPENSSH\s+)?PRIVATE\s+KEY-----'
    fix_suggestion: |
      Private keys must never be embedded in source code. Store in secure vaults:

      ```typescript
      // DO NOT include key blocks:
      // const privateKey = `-----BEGIN RSA PRIVATE KEY----- ... -----END RSA PRIVATE KEY-----`;

      // Instead: load from environment or vault
      const privateKey = process.env.PRIVATE_KEY;
      if (!privateKey) {
        throw new Error('PRIVATE_KEY environment variable is required');
      }

      const key = crypto.createPrivateKey({
        key: Buffer.from(privateKey, 'base64'),
        format: 'pem',
      });
      ```

      Or for files:
      ```typescript
      const privateKey = await fs.readFile(process.env.PRIVATE_KEY_PATH, 'utf8');
      ```

      Environment variables: `PRIVATE_KEY`, `PRIVATE_KEY_PATH`
      Storage: HashiCorp Vault, AWS Secrets Manager, 1Password, or encrypted files.

      If exposed, rotate the key immediately.
    examples_match:
      - '-----BEGIN RSA PRIVATE KEY-----'
      - '-----BEGIN EC PRIVATE KEY-----'
      - '-----BEGIN OPENSSH PRIVATE KEY-----'
    examples_no_match:
      - 'const key = process.env.PRIVATE_KEY;'
      - 'const cert = fs.readFileSync(keyPath, "utf8");'

  - id: credentials.bearer-literal
    description: Hardcoded Bearer token in Authorization header (filter out placeholders)
    severity: critical
    confidence: medium
    proposal: P448
    tags: [credentials, bearer, secret, sensitive]
    regex: 'Authorization\s*:\s*Bearer\s+(?!<[^>]*>|xxx|YOUR_|test|REDACTED)[a-zA-Z0-9\.\-_]+'
    fix_suggestion: |
      Authorization tokens must never be hardcoded. Use environment variables:

      ```typescript
      // DO NOT:
      // const auth = "Authorization: Bearer abc123def456...";

      // Instead:
      const token = process.env.AUTH_TOKEN;
      if (!token) throw new Error('AUTH_TOKEN is required');

      const response = await fetch(url, {
        headers: { Authorization: `Bearer ${token}` },
      });
      ```

      Environment variable: `AUTH_TOKEN` (or domain-specific: `GITHUB_TOKEN`, `SLACK_TOKEN`, etc.)

      Filter out obvious placeholders like `<token>`, `xxx`, `YOUR_TOKEN`, etc.
    examples_match:
      - 'Authorization: Bearer eyJhbGciOiJIUzI1NiIs...'
      - 'headers: { "Authorization": "Bearer abc123def456" }'
    examples_no_match:
      - 'Authorization: Bearer <token>'
      - 'Authorization: Bearer YOUR_TOKEN_HERE'
      - 'Authorization: Bearer ${process.env.AUTH_TOKEN}'

  - id: credentials.password-eq
    description: Assignment of non-placeholder password value (password = "...")
    severity: critical
    confidence: medium
    proposal: P448
    tags: [credentials, password, secret, sensitive]
    file_glob_exclude: ['**/*.test.ts', '**/*.spec.ts', 'tests/**', 'database/dml/**']
    regex: 'password\s*[:=]\s*["\'][^"\']{8,}["\']'
    fix_suggestion: |
      Passwords must never be hardcoded. Use environment variables or credential stores:

      ```typescript
      // DO NOT:
      // const password = "MySecretPassword123";

      // Instead:
      const password = process.env.DB_PASSWORD;
      if (!password) {
        throw new Error('DB_PASSWORD environment variable is required');
      }

      const pool = new Pool({
        user: process.env.PGUSER,
        password,
        host: process.env.PGHOST,
      });
      ```

      Or use .pgpass / .netrc (secure local files with restricted permissions):
      ```bash
      # ~/.pgpass
      localhost:5432:*:admin:secretpassword
      # chmod 600 ~/.pgpass
      ```

      Environment variables: `DB_PASSWORD`, `PGPASSWORD` (via .pgpass preferred)

      If exposed, rotate the password immediately.
    examples_match:
      - 'password: "MySecretPassword123",'
      - 'const pwd = "p@ssw0rd2024";'
    examples_no_match:
      - 'const password = process.env.DB_PASSWORD;'
      - 'const password = "password"; // placeholder in test'

  - id: credentials.dotenv-leak-in-source
    description: .env-style lines committed to .ts/.js files (PGPASSWORD=value, not in template)
    severity: critical
    confidence: high
    proposal: P448
    tags: [credentials, dotenv, secret, sensitive]
    file_glob: ['src/**/*.ts', 'src/**/*.js', 'scripts/**/*.ts']
    regex: '^[A-Z_]+=[^\s"\'`]+'
    fix_suggestion: |
      Environment variable assignments must never be committed inline.
      Use .env files (gitignored) or load from vault:

      ```typescript
      // DO NOT commit:
      // PGPASSWORD=mysecret
      // API_KEY=sk-abc123

      // Instead:
      // 1. Create .env (gitignored):
      //    PGPASSWORD=mysecret
      //    API_KEY=sk-abc123

      // 2. Load in code:
      import dotenv from 'dotenv';
      dotenv.config({ path: process.env.ENV_FILE ?? '.env' });
      const password = process.env.PGPASSWORD;

      // 3. Or use environment templates in deployment:
      const password = process.env.PGPASSWORD ??
        (await vault.getSecret('db/password'));
      ```

      .env files are gitignored automatically. Never commit credential values.
    examples_match:
      - 'PGPASSWORD=mypassword'
      - 'API_KEY=sk-proj-abc123'
    examples_no_match:
      - 'const password = process.env.PGPASSWORD;'
      - 'export PGPASSWORD="${VAULT_PASSWORD}"'
