# .gitlab-ci.yml — agentRoadmap CI

stages:
  - security
  - check
  - test
  - build

variables:
  NODE_ENV: test

.node-setup: &node-setup
  image: node:24-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci

# ─── Stage 0: Security ────────────────────────────────────────
secret-scan:
  image: zricethezav/gitleaks:latest
  stage: security
  script:
    - gitleaks detect --source . --verbose
  allow_failure: true  # 先 soft run，调准了再改 hard fail

dependency-audit:
  <<: *node-setup
  stage: security
  script:
    - npm audit --audit-level=high
  allow_failure: true  # 先 soft run

# ─── Stage 1: Check ───────────────────────────────────────────
type-check:
  <<: *node-setup
  stage: check
  script:
    - npm run check:types
  allow_failure: false

lint:
  <<: *node-setup
  stage: check
  script:
    - npm run check
  allow_failure: true  # biome warnings 不阻塞，先软跑

# ─── Stage 2: Test ────────────────────────────────────────────
test:
  <<: *node-setup
  stage: test
  script:
    - npm test
  timeout: 10m

# ─── Stage 3: Build ───────────────────────────────────────────
build:
  <<: *node-setup
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
